    <ellipse cx="144" cy="158" rx="88" ry="76" fill="url(#av-face)"/>
  </g>
  <ellipse cx="72" cy="148" rx="22" ry="28" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="216" cy="148" rx="22" ry="28" fill="#ffffff" opacity="0.95"/>
