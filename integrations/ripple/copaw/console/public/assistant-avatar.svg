<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 288 288" role="img" aria-label="Assistant">
  <title>Assistant</title>
  <defs>
    <linearGradient id="av-bg" x1="18%" y1="12%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="av-face" x1="30%" y1="20%" x2="70%" y2="85%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="av-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="b"/>
      <feOffset dx="0" dy="2" in="b" result="o"/>
      <feComponentTransfer in="o" result="a">
        <feFuncA type="linear" slope="0.22"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="a"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="144" cy="144" r="144" fill="url(#av-bg)"/>
  <circle
