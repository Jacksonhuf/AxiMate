# AxiMate cloud stack (demo gateway + orchestrator + worker).
# Build from repository root:  docker compose -f deploy/docker-compose.yml up -d --build
# Or from this directory:       docker compose up -d --build

services:
  orchestrator:
    build:
      context: ..
      dockerfile: deploy/orchestrator/Dockerfile
    restart: unless-stopped
    environment:
      AXIMATE_ORCH_HOST: 0.0.0.0
      AXIMATE_ORCH_PORT: "8080"
      AXIMATE_ORCH_LOG_LEVEL: ${AXIMATE_ORCH_LOG_LEVEL:-INFO}
      AXIMATE_ORCH_API_KEY: ${AXIMATE_ORCH_API_KEY:-}

  worker:
    build:
      context: ..
      dockerfile: deploy/worker/Dockerfile
    restart: unless-stopped
    environment:
      AXIMATE_WORKER_HOST: 0.0.0.0
      AXIMATE_WORKER_PORT: "8090"
      AXIMATE_WORKER_LOG_LEVEL: ${AXIMATE_WORKER_LOG_LEVEL:-INFO}

  gateway:
    build:
      context: ..
      dockerfile: deploy/gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "${AXIMATE_GATEWAY_HTTP_PORT:-80}:80"
    environment:
      AXIMATE_GATEWAY_BASIC_USER: ${AXIMATE_GATEWAY_BASIC_USER:-}
      AXIMATE_GATEWAY_BASIC_PASS: ${AXIMATE_GATEWAY_BASIC_PASS:-}
    depends_on:
      - orchestrator
      - worker
